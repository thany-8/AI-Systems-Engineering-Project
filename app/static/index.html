<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="A music recommender that retrieves songs (RAG) and re-ranks them with a trained vibe model." />
  <title>Music RAG Recommender</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <a class="skip-link" href="#message">Skip to message input</a>

  <div class="app">
    <header class="app__header">
      <div class="brand">
        <span class="brand__logo" aria-hidden="true">🎵🤖</span>
        <div class="brand__text">
          <h1 class="brand__title">VibeFlow Music Recommender</h1>
          <p class="brand__tag">Finds songs that match a user’s taste, ranks them with a custom scoring model, and explains why each song was recommended.</p>
        </div>
      </div>
      <span id="mode-badge" class="badge badge--loading" title="Reasoning mode" aria-live="polite">checking…</span>
    </header>

    <main class="chat">
      <ol id="messages" class="messages" aria-live="polite" aria-label="Conversation"></ol>
    </main>

    <div class="suggestions" aria-label="Example prompts">
      <button type="button" class="chip">Calm music for studying</button>
      <button type="button" class="chip">High-energy workout songs</button>
      <button type="button" class="chip">Sad songs for a rainy day</button>
      <button type="button" class="chip">Latin party music</button>
    </div>

    <form id="composer" class="composer" autocomplete="off">
      <label class="sr-only" for="message">Describe what you want to hear</label>
      <textarea id="message" name="message" rows="1"
                placeholder="Describe a mood, activity, or genre… e.g. “upbeat pop for a road trip”"
                required></textarea>
      <button id="send" type="submit" class="send">Recommend</button>
    </form>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
