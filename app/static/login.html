<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Log in to your AI Playlist Generator account." />
  <title>Log in — AI Playlist Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%8E%B5%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="nav">
    <a class="brand" href="/">
      <span class="brand__icon" aria-hidden="true">✦</span>
      <span class="brand__meta">
        <span class="brand__name">AI Playlist Generator <span class="badge-beta">BETA</span></span>
        <span class="brand__by">By VibeFlow</span>
      </span>
    </a>
    <nav class="nav__right" aria-label="Primary">
      <span id="auth-slot" class="auth-slot"></span>
    </nav>
  </header>

  <main class="wrap auth-wrap">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="lead">Log in to create and save your playlists.</p>
      <div id="form-error" class="form-error" role="alert"></div>
      <form id="auth-form" data-mode="login" autocomplete="on" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Your password" required />
        </div>
        <button type="submit" class="btn btn--primary btn--block">Log in</button>
      </form>
      <p class="auth-alt">New here? <a href="/signup">Create an account</a></p>
    </div>
  </main>

  <script src="/static/nav.js" defer></script>
  <script src="/static/auth.js" defer></script>
</body>
</html>
